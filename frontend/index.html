<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Detection</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="sidebar">

        <h2>Controls</h2>

        <h3>Input Source</h3>

        <button onclick="useCamera()">Camera</button>
        <button onclick="triggerUpload()">Upload</button>
        <button onclick="stopAll()">Stop</button>

        <input type="file" id="fileInput" style="display:none">

        <h3>Models</h3>

        <button onclick="setModel('YOLO')">YOLO</button>
        <button onclick="setModel('FasterRCNN')">Faster R-CNN</button>

        <div id="metrics"></div>

    </div>

    <div class="main">
        <div class="container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
